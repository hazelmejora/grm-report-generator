<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GRM Marine Summary Report Generator</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; padding:0; }
.container { width:1000px; margin:40px auto; background:white; padding:40px; border-radius:8px; }
h1 { text-align:center; color:#1f3c88; }
.section { margin-top:30px; }
.row { display:flex; gap:20px; }
.row div { flex:1; }
label { display:block; margin-top:15px; font-weight:bold; }
input, textarea { width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:4px; }
textarea { height:80px; }
button { margin-top:30px; width:100%; padding:12px; background:#1f3c88; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer; }
button:hover { background:#163172; }
</style>
</head>

<body>
<div class="container">

<h1>GRM Marine Summary Report Generator</h1>

<form action="/generate" method="post">

<div class="section">
<h3>General Information</h3>

<div class="row">
<div>
<label>Principal</label>
<input type="text" name="principal" required>
</div>
<div>
<label>Vessel</label>
<input type="text" name="vessel" required>
</div>
</div>

<div class="row">
<div>
<label>Port</label>
<input type="text" name="port" required>
</div>
<div>
<label>Date</label>
<input type="text" name="date" required>
</div>
</div>

<label>Job Scope</label>
<input type="text" name="job_scope" required>

<label>Surveyor</label>
<input type="text" name="surveyor" required>

<label>Owner</label>
<input type="text" name="owner">

<label>Charterer</label>
<input type="text" name="charterer">

<label>Chief Engineer</label>
<input type="text" name="chief_engineer">

<label>Master</label>
<input type="text" name="master">
</div>

<div class="section">
<h3>Bunker Selection</h3>

<label><input type="checkbox" name="include_bunker1"> Include Bunker 1</label>
<label><input type="checkbox" name="include_bunker2"> Include Bunker 2</label>
<label><input type="checkbox" name="connected_transfer"> Bunker 1 & 2 Transfer Connected</label>
</div>

<div class="section">
<h3>Bunker 1 Supply</h3>

<div class="row">
<div>
<label>BDR Quantity</label>
<input type="number" step="0.001" name="bdr1">
</div>
<div>
<label>Barge Delivered</label>
<input type="number" step="0.001" name="barge1">
</div>
</div>

<div class="row">
<div>
<label>Received Quantity</label>
<input type="number" step="0.001" name="received1">
</div>
<div>
<label>Nominated Quantity</label>
<input type="number" step="0.001" name="nominated1">
</div>
</div>

</div>

<div class="section">
<h3>Surveyor Comments</h3>
<textarea name="comments"></textarea>
</div>

<button type="submit">Generate PDF</button>

</form>

</div>
</body>
</html>
