<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GRM Summary Report</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; padding:0; }

.container {
    width: 900px;
    margin: 40px auto;
    background: white;
    padding: 50px;
    border: 3px solid #1f3c88;
}

.center { text-align: center; }

h2 { margin-bottom: 5px; }

input, select {
    border: none;
    border-bottom: 1px solid black;
    font-size: 14px;
    padding: 4px;
    outline: none;
}

.inline { width: 180px; }
.wide { width: 400px; }

button {
    margin-top: 40px;
    width: 100%;
    padding: 14px;
    background: #1f3c88;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

button:hover { background:#163172; }
</style>
</head>

<body>
<div class="container">

<form action="/generate" method="post">

<div class="center">
<h2>SUMMARY REPORT</h2>

<input type="text" name="job_scope" class="wide center"
placeholder="Job Scope"><br><br>

MV. "<input type="text" name="vessel" class="inline"
placeholder="Vessel">"
</div>

<br>

Dear <input type="text" name="principal" class="inline"
placeholder="Principal">,

<br><br>

We are pleased to confirm that our surveyor
<input type="text" name="surveyor" class="inline"
placeholder="Surveyor">
has attended on board the vessel
"<input type="text" name="vessel" class="inline"
placeholder="Vessel">"
at
<input type="text" name="port" class="inline"
placeholder="Port">
to carry out
<input type="text" name="job_scope" class="inline"
placeholder="Job Scope">
on
<input type="text" name="survey_date" class="inline"
placeholder="Survey Date">.

<br><br>

<b>Bunker Supply 1:</b>
<select name="bunker1_supply">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<br><br>

Bunker
<input type="text" name="bunker1_name" class="inline">
Commenced at
<input type="text" name="bunker1_commenced_hour" class="inline">
on
<input type="text" name="bunker1_commenced_date" class="inline">
Completed at
<input type="text" name="bunker1_completed_hour" class="inline">
on
<input type="text" name="bunker1_completed_date" class="inline">

<br><br>

<b>Bunker Supply 2:</b>
<select name="bunker2_supply">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<br><br>

Bunker
<input type="text" name="bunker2_name" class="inline">
Commenced at
<input type="text" name="bunker2_commenced_hour" class="inline">
on
<input type="text" name="bunker2_commenced_date" class="inline">
Completed at
<input type="text" name="bunker2_completed_hour" class="inline">
on
<input type="text" name="bunker2_completed_date" class="inline">

<br><br>

Owner:
<input type="text" name="owner" class="wide"><br><br>

Charterer:
<input type="text" name="charterer" class="wide"><br><br>

Chief Engineer:
<input type="text" name="chief_engineer" class="wide"><br><br>

Master:
<input type="text" name="master" class="wide">

<button type="submit">Generate PDF</button>

</form>

</div>
</body>
</html>
